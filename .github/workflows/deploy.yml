name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Create SQLite Database
        run: touch database/database.sqlite

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run Database Migrations
        run: php artisan migrate --force

      - name: Verify Code Style
        run: composer lint:check

      - name: Build Assets
        run: npm run build

      - name: Verify Built Assets
        run: |
          test ! -f public/hot
          test -f public/build/manifest.json

      - name: Run Tests
        run: php artisan test --compact

      - name: Package Release Artifact
        run: |
          archive_path="${RUNNER_TEMP}/webportfolio-release.tar.gz"

          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.codex \
            --exclude=node_modules \
            --exclude=tests \
            --exclude=vendor \
            -czf "${archive_path}" \
            -C "${GITHUB_WORKSPACE}" .

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v6
        with:
          name: webportfolio-release
          path: ${{ runner.temp }}/webportfolio-release.tar.gz
          if-no-files-found: error
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: webportfolio-release

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Upload release artifact to server
        run: |
          scp -i ~/.ssh/id_ed25519 -P "${{ secrets.PROD_PORT }}" webportfolio-release.tar.gz \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/tmp/webportfolio-release.tar.gz"

      - name: Deploy release on server
        env:
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.PROD_PORT }}" \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' bash -s" < .github/scripts/deploy.sh
